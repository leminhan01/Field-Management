<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - Field Force</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-xl flex flex-col gap-xl">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center justify-center gap-sm">
<div class="w-16 h-16 bg-primary-container text-on-primary rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">work</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary text-center">Field Force</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Đăng nhập để bắt đầu phiên làm việc</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-lg w-full" method="POST">
<!-- Input Group: Email/Phone -->
<div class="flex flex-col gap-sm">
<label class="font-label-lg text-label-lg text-on-surface" for="username">Email / Số điện thoại</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-md text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 20px;">person</span>
</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-DEFAULT focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/50 min-h-[48px]" id="username" name="username" placeholder="Nhập email hoặc số điện thoại" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-sm">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Mật khẩu</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-md text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface border border-outline-variant rounded-DEFAULT focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/50 min-h-[48px]" id="password" name="password" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-md text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full">
<a class="font-body-md text-body-md text-primary hover:text-primary-fixed-variant transition-colors underline-offset-2 hover:underline" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary font-button text-button py-md rounded-DEFAULT min-h-[48px] flex items-center justify-center gap-sm hover:bg-surface-tint active:scale-[0.98] transition-all shadow-sm" type="submit">
                Đăng nhập
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
</div>
</body></html>
