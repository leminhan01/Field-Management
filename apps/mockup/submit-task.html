<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Báo cáo Hiện trường</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "outline": "#767683",
                      "tertiary-container": "#5c1800",
                      "on-primary-container": "#8690ee",
                      "tertiary-fixed": "#ffdbd0",
                      "background": "#f7f9fc",
                      "inverse-on-surface": "#eff1f4",
                      "inverse-surface": "#2d3133",
                      "surface-dim": "#d8dadd",
                      "primary-container": "#1a237e",

                      "error": "#ba1a1a",
                      "on-tertiary-fixed-variant": "#7b2e12",
                      "surface": "#f7f9fc",
                      "on-secondary-fixed": "#002204",
                      "surface-container": "#eceef1",
                      "secondary-container": "#91f78e",
                      "secondary": "#006e1c",
                      "on-tertiary-container": "#e17c5a",
                      "on-surface": "#191c1e",
                      "tertiary-fixed-dim": "#ffb59d",
                      "on-secondary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-container-high": "#e6e8eb",
                      "on-secondary-fixed-variant": "#005313"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",

              "spacing": {
                      "sm": "8px",
                      "xl": "32px",
                      "base": "4px",

                      "md": "16px",

                      "xs": "4px",
                      "touch-target": "48px"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "label-lg": ["Inter"],
                      "headline-md": ["Inter"],

<style>
        body {
            background-color: #F5F7FA; /* Custom Level 0 Background as per Style Guidance */
            -webkit-tap-highlight-color: transparent;
        }
        .card-elevation {
            box-shadow: 0 4px 4px rgba(0, 0, 0, 0.02);
        }
        .input-focus:focus-within {
            border-color: #1a237e;
            border-width: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md text-on-surface antialiased flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim fixed top-0 left-0 w-full border-b border-outline-variant dark:border-outline shadow-sm flex items-center justify-between px-4 h-14 w-full z-50">
<button aria-label="Menu" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-variant/50 active:scale-95 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-title-lg text-title-lg text-primary dark:text-primary-fixed-dim">Điều hành Hiện trường</h1>
<button aria-label="Profile" class="w-touch-target h-touch-target flex items-center justify-center hover:bg-surface-variant/50 active:scale-95 transition-transform duration-150 rounded-full">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-lg text-label-lg">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[72px] pb-[100px] px-container-padding flex flex-col gap-md max-w-2xl mx-auto w-full">
<!-- Header Info -->
<div class="pt-sm pb-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Báo cáo Điểm bán</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Cửa hàng Tạp hóa Cô Hoa - Mã: #CH-001</p>
</div>
<!-- Camera/Photo Proof Section -->
<section class="bg-surface rounded-lg border border-surface-variant card-elevation p-md flex flex-col gap-md">
<h3 class="font-title-lg text-title-lg text-on-surface flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">photo_camera</span>
                Ảnh Minh Chứng
            </h3>
<div class="grid grid-cols-2 gap-sm">
<!-- Camera Trigger (Primary Action) -->
<button class="col-span-2 md:col-span-1 h-32 rounded-xl border-2 border-dashed border-primary-container bg-surface-bright flex flex-col items-center justify-center gap-xs hover:bg-surface-variant/20 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[32px] text-primary-container" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="font-button text-button text-primary-container">Chụp Ảnh Trưng Bày</span>
</button>
<!-- Existing Photo Thumbnail (Example) -->
<div class="col-span-2 md:col-span-1 h-32 rounded-xl bg-surface-variant relative overflow-hidden group">
<img alt="Hình ảnh trưng bày" class="w-full h-full object-cover" data-alt="A brightly lit aisle in a modern convenience store, showing neatly organized shelves fully stocked with various colorful packaged snacks and beverages. The lighting is harsh fluorescent, typical of retail environments. The perspective is a straight-on wide shot to capture the entire display unit. The overall aesthetic is clean, methodical, and utilitarian." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWnIFSK-EIhpUbBFBjmtpqBE9WCuzOHIMN_IjbSLMZFaKsDFmzboapF_gcTjSaZ5ppKTApQdu5hTUVM4gNj53T7RtC2GP2tPtl8GaUqDgi6xsVZxgDjUrfaDcMbFxqShVdQ9wJrni1EWdgUeYBfjC_1yZKOuDw9aMgo5BHzsYnpcHbakaVyD8otvxIwcuCihxklp4uG6s6B2E3V35vnCKKxIlE-7atTHD6dSjEhBvERUW4DZYL5iPVs14FyGt4Ra_yuhw_LvOMB9z8"/>
<button aria-label="Xóa ảnh" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-surface/80 flex items-center justify-center text-error hover:bg-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
<div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-2">
<span class="font-label-lg text-label-lg text-on-primary">10:45 AM - Mặt tiền</span>
</div>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Yêu cầu ít nhất 1 ảnh toàn cảnh kệ hàng.</p>
</section>
<!-- Data Entry Section -->
<section class="bg-surface rounded-lg border border-surface-variant card-elevation p-md flex flex-col gap-md">
<h3 class="font-title-lg text-title-lg text-on-surface flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">analytics</span>
                Số liệu Kiểm kê
            </h3>
<div class="flex flex-col gap-md">
<!-- Input Field 1 -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="stock-count">Số lượng hàng tồn (Thùng)</label>
<div class="relative flex items-center bg-surface-bright border border-outline-variant rounded-DEFAULT input-focus transition-all overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant pl-3 pr-2 select-none">inventory_2</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface py-3 pr-3 h-[48px]" id="stock-count" placeholder="Nhập số lượng..." type="number"/>
</div>
</div>
<!-- Input Field 2 -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="display-count">Số mặt hàng trưng bày (Mặt)</label>
<div class="relative flex items-center bg-surface-bright border border-outline-variant rounded-DEFAULT input-focus transition-all overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant pl-3 pr-2 select-none">storefront</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface py-3 pr-3 h-[48px]" id="display-count" placeholder="Nhập số lượng..." type="number"/>
</div>
</div>
<!-- Notes Field -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="notes">Ghi chú thêm (Tùy chọn)</label>
<div class="relative flex items-start bg-surface-bright border border-outline-variant rounded-DEFAULT input-focus transition-all overflow-hidden p-2">
<textarea class="flex-1 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface resize-none p-1" id="notes" placeholder="Ghi chú về tình trạng kệ hàng, thái độ khách hàng..." rows="3"></textarea>
</div>
</div>
</div>
</section>
<!-- Submit Action -->
<div class="mt-sm mb-lg">
<button class="w-full h-touch-target rounded-full bg-[#4CAF50] text-on-primary font-button text-button flex items-center justify-center gap-sm hover:bg-[#43a047] active:scale-[0.98] transition-all shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                Gửi Báo Cáo
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-surface-container dark:bg-surface-container-highest rounded-t-full shadow-lg z-50 flex justify-around items-center px-2 pb-2 h-[72px] md:hidden">
<!-- Tab 1: Nhiệm vụ (Active Semantic Match for Reporting/Tasks) -->
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-container text-on-secondary-container dark:text-secondary-fixed rounded-full px-5 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="font-label-lg text-label-lg mt-1">Nhiệm vụ</span>
</button>
<!-- Tab 2: Bản đồ -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high rounded-full px-5 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-[24px]">map</span>
<span class="font-label-lg text-label-lg mt-1">Bản đồ</span>
</button>
<!-- Tab 3: Thông báo -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high rounded-full px-5 py-1 active:scale-90 transition-all duration-200 relative">
<span class="material-symbols-outlined text-[24px]">notifications</span>
<!-- Badge example -->
<span class="absolute top-1 right-4 w-2 h-2 rounded-full bg-error"></span>
<span class="font-label-lg text-label-lg mt-1">Thông báo</span>
</button>
<!-- Tab 4: Cá nhân -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high rounded-full px-5 py-1 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="font-label-lg text-label-lg mt-1">Cá nhân</span>
</button>
</nav>
<script>
        // Simple script to handle input focus visuals if needed beyond css
        document.querySelectorAll('input, textarea').forEach(element => {
            element.addEventListener('focus', function() {
                this.parentElement.style.borderColor = '#1a237e'; // Primary Navy
                this.parentElement.style.borderWidth = '2px';
            });
            element.addEventListener('blur', function() {
                this.parentElement.style.borderColor = ''; // Reset to tailwind class
                this.parentElement.style.borderWidth = '';
            });
        });
    </script>
</body></html>
